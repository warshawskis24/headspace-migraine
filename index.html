<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Headspace — Migraine Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #090c14;
      --surface:      #111827;
      --card:         #162034;
      --card-hover:   #1c293f;
      --border:       rgba(148,163,184,0.07);
      --border-soft:  rgba(148,163,184,0.13);

      --accent:       #a78bfa;
      --accent-dim:   rgba(167,139,250,0.14);
      --accent-glow:  rgba(167,139,250,0.28);
      --teal:         #2dd4bf;
      --teal-dim:     rgba(45,212,191,0.12);
      --orange:       #fb923c;
      --orange-dim:   rgba(251,146,60,0.12);

      --text:         #e2e8f0;
      --text-dim:     #94a3b8;
      --text-muted:   #4b5563;

      --p1: #34d399; --p1b: rgba(52,211,153,0.13);
      --p2: #86efac; --p2b: rgba(134,239,172,0.13);
      --p3: #fbbf24; --p3b: rgba(251,191,36,0.13);
      --p4: #f97316; --p4b: rgba(249,115,22,0.13);
      --p5: #f87171; --p5b: rgba(248,113,113,0.13);

      --font-d: 'Cormorant Garamond', Georgia, serif;
      --font-b: 'DM Sans', system-ui, sans-serif;
      --r: 16px; --rsm: 10px; --rf: 9999px;
      --nav: 76px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-b); font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    #root { height: 100%; max-width: 430px; margin: 0 auto; position: relative; overflow: hidden; }
    .app { height: 100%; display: flex; flex-direction: column; }
    .scroll { flex: 1; overflow-y: auto; padding-bottom: calc(var(--nav) + 20px); scrollbar-width: none; }
    .scroll::-webkit-scrollbar { display: none; }

    /* ── NAV ── */
    .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; height: var(--nav); background: rgba(17,24,39,0.95); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; z-index: 100; backdrop-filter: blur(20px); }
    .nb { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; padding: 8px 4px; color: var(--text-muted); transition: color .2s; font-family: var(--font-b); }
    .nb.on { color: var(--accent); }
    .nb svg { width: 20px; height: 20px; }
    .nb span { font-size: 9px; font-weight: 500; letter-spacing: .04em; }
    .fab-wrap { flex: 1; display: flex; justify-content: center; }
    .fab { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #7c3aed); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 24px var(--accent-glow); transition: all .2s; transform: translateY(-8px); }
    .fab:hover { transform: translateY(-11px) scale(1.05); }
    .fab svg { width: 24px; height: 24px; color: #fff; }

    /* ── SHARED ── */
    .ph { padding: 56px 22px 16px; }
    .greet { font-family: var(--font-d); font-size: 38px; font-weight: 300; letter-spacing: -.02em; line-height: 1.15; }
    .greet em { font-style: italic; color: var(--accent); }
    .date-lbl { font-size: 12px; color: var(--text-muted); margin-top: 4px; letter-spacing: .05em; text-transform: uppercase; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 18px 20px; margin: 0 14px 11px; }
    .ct { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 13px; }
    .sec-head { font-family: var(--font-d); font-size: 28px; font-weight: 300; padding: 52px 22px 4px; letter-spacing: -.01em; }
    .sec-sub { font-size: 13px; color: var(--text-dim); padding: 0 22px; margin-bottom: 18px; }
    .sec-div { padding: 0 22px; margin: 10px 0 8px; font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); }

    /* ── WEATHER ── */
    .wx-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .wx-stat { background: rgba(255,255,255,0.03); border-radius: var(--rsm); padding: 11px 13px; }
    .wx-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
    .wx-val { font-size: 22px; font-weight: 600; }
    .wx-unit { font-size: 11px; color: var(--text-dim); }
    .risk { display: inline-flex; align-items: center; gap: 6px; padding: 4px 13px; border-radius: var(--rf); font-size: 12px; font-weight: 600; margin-top: 13px; }
    .r-low  { background: rgba(52,211,153,.12); color: #34d399; }
    .r-mod  { background: rgba(251,191,36,.12);  color: #fbbf24; }
    .r-high { background: rgba(248,113,113,.12); color: #f87171; }

    /* ── TODAY SCORES ── */
    .scores-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .slot { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: var(--rsm); padding: 11px 10px; cursor: pointer; transition: border-color .2s; }
    .slot:hover { border-color: var(--border-soft); }
    .slot-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 5px; }
    .slot-val { font-family: var(--font-d); font-size: 32px; font-weight: 400; line-height: 1; }
    .slot-emp { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ── MINI TREND ── */
    .mini-bars { display: flex; align-items: flex-end; gap: 5px; height: 44px; }
    .mb { flex: 1; border-radius: 3px 3px 0 0; min-height: 3px; }
    .mini-days { display: flex; gap: 5px; margin-top: 5px; }
    .mini-days span { flex: 1; text-align: center; font-size: 10px; color: var(--text-muted); }

    /* ── WIZARD ── */
    .wizard { min-height: 100%; display: flex; flex-direction: column; }

    /* Header */
    .w-hdr { display: flex; align-items: center; justify-content: space-between; padding: 52px 22px 20px; }
    .w-back { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border-soft); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-dim); transition: all .18s; flex-shrink: 0; }
    .w-back:hover { background: var(--card); color: var(--text); }
    .w-back[disabled] { opacity: 0; pointer-events: none; }

    /* Progress pill */
    .w-prog { display: flex; align-items: center; gap: 5px; }
    .w-dot { height: 6px; border-radius: 3px; background: var(--card-hover); transition: all .3s ease; }
    .w-dot.past { background: var(--accent); width: 6px; }
    .w-dot.cur  { background: var(--accent); width: 22px; }
    .w-dot.future { width: 6px; }

    /* Body */
    .wbody { flex: 1; padding: 0 22px 40px; }
    .w-ttl { font-family: var(--font-d); font-size: 38px; font-weight: 300; letter-spacing: -.02em; line-height: 1.15; margin-bottom: 6px; }
    .w-ttl em { font-style: italic; color: var(--accent); }
    .w-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 30px; }

    /* Step fade-in */
    @keyframes wfi { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .wstep { animation: wfi .28s ease forwards; }

    /* ── STEP 1: Time cards ── */
    .time-card { width: 100%; display: flex; align-items: center; gap: 16px; background: var(--card); border: 1.5px solid var(--border); border-radius: var(--r); padding: 20px 18px; margin-bottom: 10px; cursor: pointer; transition: all .18s; font-family: var(--font-b); }
    .time-card:hover { border-color: var(--accent); background: var(--card-hover); transform: translateX(4px); }
    .time-card.on { border-color: var(--accent); background: var(--accent-dim); transform: translateX(4px); }
    .tc-e   { font-size: 30px; line-height: 1; flex-shrink: 0; }
    .tc-body { flex: 1; }
    .tc-label { font-size: 18px; font-weight: 500; color: var(--text); line-height: 1.2; }
    .tc-sub   { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .tc-arr   { width: 18px; height: 18px; color: var(--text-muted); flex-shrink: 0; transition: transform .18s; }
    .time-card:hover .tc-arr { transform: translateX(3px); color: var(--accent); }

    /* ── STEP 2: Severity ── */
    .sev-btn { width: 100%; display: flex; align-items: center; gap: 16px; background: var(--card); border: 2px solid transparent; border-radius: var(--r); padding: 15px 18px; margin-bottom: 9px; cursor: pointer; transition: all .18s; font-family: var(--font-b); }
    .sev-btn:hover { border-color: rgba(255,255,255,.08); transform: translateX(5px); }
    .sev-btn.on { transform: translateX(7px); }
    .sb-num { font-family: var(--font-d); font-size: 44px; font-weight: 400; line-height: 1; width: 50px; text-align: center; flex-shrink: 0; }
    .sb-info { flex: 1; text-align: left; }
    .sb-lbl  { font-size: 16px; font-weight: 500; color: var(--text); line-height: 1.3; }
    .sb-desc { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .sb-pips { display: flex; gap: 5px; margin-top: 7px; }
    .sb-pip  { width: 10px; height: 10px; border-radius: 50%; transition: background .18s; }

    /* ── STEP 3: Details ── */
    .w-sect { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); margin: 20px 0 10px; }
    .w-sect:first-child { margin-top: 0; }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip { padding: 6px 13px; border-radius: var(--rf); border: 1px solid var(--border-soft); background: transparent; font-family: var(--font-b); font-size: 12px; color: var(--text-dim); cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 5px; }
    .chip:hover { border-color: var(--accent); color: var(--text); }
    .chip.on { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .chip.med:hover { border-color: var(--teal); }
    .chip.med.on { background: var(--teal-dim); border-color: var(--teal); color: var(--teal); }
    .chip.sym:hover { border-color: var(--teal); }
    .chip.sym.on { background: rgba(45,212,191,0.15); border-color: var(--teal); color: var(--teal); }
    .chip.wi:hover { border-color: var(--orange); }
    .chip.wi.on { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }
    .chip.other-btn { border-style: dashed; }
    .chip.other-btn:hover { border-color: var(--accent); color: var(--accent); border-style: dashed; }

    /* dosage */
    .dosage-wrap { margin-top: 10px; }
    .dosage-row { display: flex; align-items: center; gap: 9px; }
    .dosage-lbl { font-size: 12px; color: var(--text-muted); white-space: nowrap; min-width: 64px; }
    .dosage-inp { flex: 1; background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--rsm); padding: 7px 11px; color: var(--text); font-family: var(--font-b); font-size: 13px; outline: none; }
    .dosage-inp:focus { border-color: var(--teal); }
    .dosage-inp::placeholder { color: var(--text-muted); }

    /* other input row */
    .other-row { display: flex; gap: 7px; margin-top: 9px; }
    .other-inp { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--rsm); padding: 7px 12px; color: var(--text); font-family: var(--font-b); font-size: 13px; outline: none; }
    .other-inp:focus { border-color: var(--border-soft); }
    .other-inp::placeholder { color: var(--text-muted); }
    .other-add { padding: 7px 14px; border-radius: var(--rsm); background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); font-family: var(--font-b); font-size: 13px; font-weight: 500; cursor: pointer; }

    /* notes */
    .notes { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: var(--rsm); padding: 13px; color: var(--text); font-family: var(--font-b); font-size: 14px; resize: none; outline: none; min-height: 88px; transition: border-color .2s; }
    .notes:focus { border-color: var(--border-soft); }
    .notes::placeholder { color: var(--text-muted); }

    /* ── STEP 4: Review ── */
    .review-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 24px; }
    .rc-row { display: flex; align-items: flex-start; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .rc-row:last-child { border-bottom: none; }
    .rc-key { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); width: 72px; flex-shrink: 0; padding-top: 3px; }
    .rc-val { flex: 1; font-size: 14px; color: var(--text); line-height: 1.5; }
    .rc-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .rc-chip { font-size: 11px; padding: 2px 9px; border-radius: var(--rf); }

    /* Buttons */
    .savebtn { width: 100%; padding: 15px; border-radius: var(--r); background: linear-gradient(135deg, var(--accent), #7c3aed); border: none; color: #fff; font-family: var(--font-b); font-size: 16px; font-weight: 600; cursor: pointer; transition: all .2s; box-shadow: 0 4px 20px var(--accent-glow); letter-spacing: .02em; }
    .savebtn:hover { transform: translateY(-1px); box-shadow: 0 6px 26px var(--accent-glow); }
    .nextbtn { width: 100%; padding: 15px; border-radius: var(--r); background: transparent; border: 1.5px solid var(--accent); color: var(--accent); font-family: var(--font-b); font-size: 16px; font-weight: 600; cursor: pointer; transition: all .2s; letter-spacing: .02em; margin-top: 4px; }
    .nextbtn:hover { background: var(--accent-dim); }

    /* ── HISTORY ── */
    .hi { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 18px; margin: 0 14px 9px; display: flex; align-items: flex-start; gap: 14px; }
    .hdot { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
    .hinfo { flex: 1; }
    .hdate { font-size: 14px; font-weight: 500; }
    .hmeta { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .htags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .htag { font-size: 10px; padding: 2px 8px; background: var(--accent-dim); color: var(--accent); border-radius: var(--rf); }
    .htag.sym { background: rgba(45,212,191,.1); color: var(--teal); }
    .htag.wi  { background: var(--orange-dim); color: var(--orange); }

    /* ── INSIGHTS ── */
    .stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 9px; margin: 0 14px 11px; }
    .sc { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 10px; text-align: center; }
    .sv { font-family: var(--font-d); font-size: 34px; font-weight: 400; line-height: 1; margin-bottom: 4px; }
    .sl { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); }
    .bar-track { height: 7px; border-radius: 4px; background: var(--card-hover); overflow: hidden; margin: 5px 0; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }

    /* ── TOAST ── */
    .toast { position: fixed; top: 18px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border-soft); border-radius: var(--rf); padding: 11px 22px; font-size: 13px; font-weight: 500; z-index: 200; animation: tin .3s ease, tout .3s ease 1.7s forwards; box-shadow: 0 4px 24px rgba(0,0,0,.5); white-space: nowrap; }
    @keyframes tin  { from { opacity:0; transform:translateX(-50%) translateY(-8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    @keyframes tout { from { opacity:1; } to { opacity:0; transform:translateX(-50%) translateY(-8px); } }

    /* ── FADE ── */
    @keyframes fi { from { opacity:0; transform:translateY(7px); } to { opacity:1; transform:translateY(0); } }
    .fi { animation: fi .35s ease forwards; }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 44px 22px; color: var(--text-muted); }
    .empty svg { width: 44px; height: 44px; margin: 0 auto 14px; opacity: .25; display: block; }
    .empty p { font-size: 13px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ────────────────────────────────────────────────────────────────────────────
// CONSTANTS
// ────────────────────────────────────────────────────────────────────────────
const PAIN = [
  { v:1, color:'#34d399', bg:'rgba(52,211,153,.13)',  label:'Clear',       desc:'No pain at all'      },
  { v:2, color:'#86efac', bg:'rgba(134,239,172,.13)', label:'Mild',        desc:'Noticeable, manageable' },
  { v:3, color:'#fbbf24', bg:'rgba(251,191,36,.13)',  label:'Moderate',    desc:'Distracting, slowing me down' },
  { v:4, color:'#f97316', bg:'rgba(249,115,22,.13)',  label:'Significant', desc:'Hard to function normally' },
  { v:5, color:'#f87171', bg:'rgba(248,113,113,.13)', label:'Severe',      desc:'Debilitating'        },
];

const TRIGGERS = [
  { id:'bright_lights', e:'💡', l:'Bright Lights'   },
  { id:'screen_time',   e:'📱', l:'Screen Time'      },
  { id:'sunlight',      e:'☀️', l:'Sunlight'          },
  { id:'loud_sounds',   e:'🔊', l:'Loud Sounds'      },
  { id:'noise',         e:'🔉', l:'Noise'            },
  { id:'driving',       e:'🚗', l:'Driving'          },
  { id:'biking',        e:'🚴', l:'Biking'           },
  { id:'stress',        e:'😤', l:'Stress'           },
  { id:'anxiety',       e:'😰', l:'Anxiety'          },
  { id:'crying',        e:'😢', l:'Crying'           },
  { id:'poor_sleep',    e:'😴', l:'Poor Sleep'       },
  { id:'lack_of_sleep', e:'🌛', l:'Lack of Sleep'   },
  { id:'weather',       e:'🌩️', l:'Weather Change'  },
  { id:'heat',          e:'🌡️', l:'Heat/Humidity'   },
  { id:'alcohol',       e:'🍷', l:'Alcohol'          },
  { id:'caffeine',      e:'☕', l:'Caffeine'         },
  { id:'exercise',      e:'🏃', l:'Exercise'         },
  { id:'strong_smell',  e:'👃', l:'Strong Smell'     },
  { id:'dehydration',   e:'💧', l:'Dehydration'      },
  { id:'neck_tension',  e:'💆', l:'Neck Tension'     },
  { id:'restaurant',    e:'🍽️', l:'Restaurant'      },
  { id:'bowen',         e:'🤲', l:'Bowen'            },
];

const MEDS = [
  { id:'ibuprofen',     label:'Ibuprofen'     },
  { id:'acetaminophen', label:'Acetaminophen' },
  { id:'sumatriptan',   label:'Sumatriptan'   },
  { id:'ubrelvy',       label:'Ubrelvy'       },
  { id:'emgality',      label:'Emgality'      },
  { id:'cefaly',        label:'Cefaly'        },
  { id:'nothing',       label:'Nothing taken' },
];

const SYMPTOMS = [
  { id:'allodynia',             l:'Allodynia'             },
  { id:'appetite_change',       l:'Appetite Change'       },
  { id:'aura',                  l:'Aura'                  },
  { id:'weakness',              l:'Weakness'              },
  { id:'visual',                l:'Visual'                },
  { id:'confusion',             l:'Confusion'             },
  { id:'cravings',              l:'Cravings'              },
  { id:'dizziness',             l:'Dizziness'             },
  { id:'emotional_instability', l:'Emotional Instability' },
  { id:'feeling_faint',         l:'Feeling Faint'         },
  { id:'nausea',                l:'Nausea'                },
  { id:'light_sensitivity',     l:'Light Sensitivity'     },
  { id:'prodrome',              l:'Prodrome'              },
  { id:'sinus_symptoms',        l:'Sinus Symptoms'        },
  { id:'sound_sensitivity',     l:'Sound Sensitivity'     },
  { id:'tinnitus',              l:'Tinnitus'              },
  { id:'vertigo',               l:'Vertigo'               },
  { id:'unilateral_headache',   l:'Unilateral Headache'   },
  { id:'bilateral_headache',    l:'Bilateral Headache'    },
  { id:'avoidance_of_movement', l:'Avoidance of Movement' },
];

const WORK_IMPACT = [
  { id:'no_impact',       label:'No Impact'        },
  { id:'late_arrival',    label:'Late Arrival'     },
  { id:'slowed_work',     label:'Slowed Work'      },
  { id:'half_day',        label:'½ Half Day'       },
  { id:'early_departure', label:'Early Departure'  },
  { id:'full_day_missed', label:'Full Day Missed'  },
];

const TIME_SLOTS = [
  { id:'am',    e:'☀️',  label:'Morning',   sub:'Before noon',      full:'Morning'   },
  { id:'pm',    e:'🌆',  label:'Afternoon', sub:'Noon to evening',  full:'Afternoon' },
  { id:'night', e:'🌙',  label:'Night',     sub:'Evening & later',  full:'Night'     },
];

const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const TIME_ORDER = { am:0, pm:1, night:2 };
const TOTAL_STEPS = 4;

// ────────────────────────────────────────────────────────────────────────────
// HELPERS
// ────────────────────────────────────────────────────────────────────────────
const pc = v => PAIN.find(p => p.v === v) || PAIN[0];
const today = () => new Date().toISOString().split('T')[0];

const getTrigLabel = id => {
  if (id && id.startsWith('custom:')) return { e:'✏️', l: id.slice(7) };
  return TRIGGERS.find(t => t.id === id) || { e:'?', l: id };
};

const getMedDisplay = med => {
  if (!med) return null;
  if (typeof med === 'string') return med;
  return med.label + (med.dosage ? ` (${med.dosage})` : '');
};

function fmtDate(ds) {
  const d = new Date(ds + 'T12:00:00');
  const t = today();
  const y = new Date(); y.setDate(y.getDate()-1);
  if (ds === t) return 'Today';
  if (ds === y.toISOString().split('T')[0]) return 'Yesterday';
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}

function greeting() {
  const h = new Date().getHours();
  if (h < 12) return { line1:'Good', line2:'Morning', period:'am' };
  if (h < 17) return { line1:'Good', line2:'Afternoon', period:'pm' };
  if (h < 21) return { line1:'Good', line2:'Evening', period:'pm' };
  return { line1:'Good', line2:'Night', period:'night' };
}

function wrand(w) {
  let r = Math.random() * w.reduce((a,b)=>a+b,0);
  for (let i=0;i<w.length;i++){r-=w[i];if(r<=0)return i+1;}
  return w.length;
}

function sampleData() {
  const ids = TRIGGERS.map(t=>t.id);
  const medList = MEDS.filter(m=>m.id!=='nothing');
  const entries = [];
  for (let i=29;i>=0;i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = d.toISOString().split('T')[0];
    const sh = [...ids].sort(()=>Math.random()-.5);
    ['am','pm'].forEach(slot => {
      const score = wrand([.3,.25,.2,.15,.1]);
      const randMed = medList[Math.floor(Math.random()*medList.length)];
      const takeMed = (score>=4&&Math.random()>.3)||(score>=3&&Math.random()>.5);
      entries.push({
        id:`${ds}-${slot}`, date:ds, time:slot, score,
        triggers: score>=3 ? sh.slice(0,Math.floor(Math.random()*3)+1) : score>=2 ? sh.slice(0,1) : [],
        medication: takeMed ? { id:randMed.id, label:randMed.label, dosage:'' } : null,
        symptoms: [],
        workImpact: null,
        notes:''
      });
    });
  }
  return entries;
}

// ────────────────────────────────────────────────────────────────────────────
// WEATHER HOOK
// ────────────────────────────────────────────────────────────────────────────
function useWeather() {
  const [wx, setWx]     = useState(null);
  const [loading, setL] = useState(true);
  const [err, setErr]   = useState(null);
  useEffect(()=>{
    if (!navigator.geolocation) { setErr('no-geo'); setL(false); return; }
    navigator.geolocation.getCurrentPosition(async pos=>{
      try {
        const {latitude:lat,longitude:lon} = pos.coords;
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,surface_pressure,precipitation_probability,wind_speed_10m&temperature_unit=celsius&timezone=auto`;
        const r = await fetch(url);
        const j = await r.json();
        const c = j.current;
        const p = c.surface_pressure, h = c.relative_humidity_2m;
        const risk = p < 1009 || h > 80 ? 'High' : p < 1013 || h > 65 ? 'Moderate' : 'Low';
        setWx({ temp:Math.round(c.temperature_2m), humidity:h, pressure:Math.round(p), precip:c.precipitation_probability, wind:Math.round(c.wind_speed_10m), risk });
      } catch(e){ setErr('fetch'); } finally { setL(false); }
    }, ()=>{ setErr('denied'); setL(false); });
  },[]);
  return {wx,loading,err};
}

// ────────────────────────────────────────────────────────────────────────────
// CHARTS
// ────────────────────────────────────────────────────────────────────────────
function LineSVG({data}) {
  const W=340,H=140, pad={t:10,r:10,b:28,l:26};
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  const valid = data.filter(d=>d.avg!==null);
  if (valid.length===0) return null;
  const xp = (i)=> pad.l + i*(cW/(data.length-1));
  const yp = (v)=> pad.t + cH - ((v-0)/(5-0))*cH;
  const pts = data.map((d,i)=>d.avg!==null ? {x:xp(i),y:yp(d.avg),avg:d.avg} : null);
  const vp  = pts.filter(Boolean);
  const line= vp.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  const area= vp.length>0 ? `M${vp[0].x},${pad.t+cH} ${vp.map(p=>`L${p.x},${p.y}`).join(' ')} L${vp[vp.length-1].x},${pad.t+cH}Z` : '';
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'100%'}}>
      <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#a78bfa" stopOpacity="0.22"/><stop offset="100%" stopColor="#a78bfa" stopOpacity="0"/></linearGradient></defs>
      {[1,2,3,4,5].map(v=>(<g key={v}><line x1={pad.l} y1={yp(v)} x2={W-pad.r} y2={yp(v)} stroke="rgba(255,255,255,0.04)" strokeWidth="1"/><text x={pad.l-5} y={yp(v)+4} textAnchor="end" fontSize="9" fill="var(--text-muted)">{v}</text></g>))}
      {area && <path d={area} fill="url(#lg)"/>}
      {line && <path d={line} fill="none" stroke="#a78bfa" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>}
      {vp.map((p,i)=>(<circle key={i} cx={p.x} cy={p.y} r="3" fill={pc(Math.round(p.avg)).color} stroke="var(--card)" strokeWidth="1.5"/>))}
      {data.filter((_,i)=>i%5===0||i===data.length-1).map((d,i)=>(<text key={i} x={xp(data.indexOf(d))} y={H-4} textAnchor="middle" fontSize="9" fill="var(--text-muted)">{d.lbl}</text>))}
    </svg>
  );
}

function TrigLoadSVG({data}) {
  const W=340, H=72, pad={t:4,r:10,b:20,l:26};
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  const maxT = Math.max(...data.map(d=>d.trigCount), 1);
  const bW   = (cW / data.length) - 2;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'100%'}}>
      {data.map((d,i)=>{
        const x=pad.l+i*(cW/data.length), bH=maxT>0?(d.trigCount/maxT)*cH:0, y=pad.t+cH-bH;
        return <rect key={i} x={x+1} y={y} width={Math.max(bW,1)} height={Math.max(bH,1)} rx="2" fill={d.trigCount>0?'rgba(45,212,191,0.38)':'rgba(255,255,255,0.03)'}/>;
      })}
      {data.filter((_,i)=>i%5===0||i===data.length-1).map((d,i)=>{
        const idx=data.indexOf(d), x=pad.l+idx*(cW/data.length)+bW/2;
        return <text key={i} x={x} y={H-3} textAnchor="middle" fontSize="9" fill="var(--text-muted)">{d.lbl}</text>;
      })}
    </svg>
  );
}

function TrigBarSVG({data}) {
  if (!data.length) return null;
  const W=320, bH=20, gap=9, lblW=120, maxV=Math.max(...data.map(d=>d.count)), barW=W-lblW-36, H=data.length*(bH+gap)+10;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
      {data.map((d,i)=>{
        const y=i*(bH+gap)+5, w=maxV>0?(d.count/maxV)*barW:0, lbl=d.l||(d.id&&d.id.startsWith('custom:')?d.id.slice(7):d.id);
        return (<g key={d.id||i}><text x="0" y={y+bH/2+4} fontSize="11" fill="var(--text-dim)">{d.e} {lbl}</text><rect x={lblW} y={y} width={w||1} height={bH} rx="4" fill="rgba(167,139,250,0.28)"/>{w>3&&<rect x={lblW} y={y} width={3} height={bH} rx="4" fill="#a78bfa"/>}<text x={lblW+w+6} y={y+bH/2+4} fontSize="11" fill="var(--text-dim)">{d.count}</text></g>);
      })}
    </svg>
  );
}

  const trigRef = useRef(null), medRef = useRef(null);

  const toggleTrig = id => setTrigs(p=>p.includes(id)?p.filter(t=>t!==id):[...p,id]);
  const toggleSym  = id => setSymptoms(p=>p.includes(id)?p.filter(s=>s!==id):[...p,id]);

  const addCustomTrig = () => {
    const v=trigOther.trim(); if(!v) return;
    const cid=`custom:${v}`;
    if(!trigs.includes(cid)) setTrigs(p=>[...p,cid]);
    setTrigOther(''); setShowTrigInp(false);
  };

  const selectMed = m => {
    setShowMedOther(false);
    setMed(p=>p&&p.id===m.id?null:{id:m.id,label:m.label,dosage:''});
  };

  const addCustomMed = () => {
    const v=medOtherLabel.trim(); if(!v) return;
    setMed({id:'custom',label:v,dosage:medOtherDosage});
    setShowMedOther(false); setMedOtherLabel(''); setMedOtherDosage('');

  return (
    <div className="wstep">

            <span>{t.e}</span>{t.l}

          <button key={t} className="chip on" onClick={()=>toggleTrig(t)}>✏️ {t.slice(7)}</button>

        ))}

        <div style={{marginTop:'9px',display:'flex',flexDirection:'column',gap:'7px'}}>

        {trigLabels.length>0 && (
          <div className="rc-row">
            <div className="rc-key">Triggers</div>
            <div className="rc-val">
              <div className="rc-chips">
                {trigLabels.map((t,i)=>(
                  <span key={i} className="rc-chip" style={{background:'var(--accent-dim)',color:'var(--accent)'}}>{t.e} {t.l}</span>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* Symptoms */}
        {symLabels.length>0 && (
          <div className="rc-row">
            <div className="rc-key">Symptoms</div>
            <div className="rc-val">
              <div className="rc-chips">
                {symLabels.map(s=>(
                  <span key={s.id} className="rc-chip" style={{background:'rgba(45,212,191,.12)',color:'var(--teal)'}}>{s.l}</span>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* Medication */}
        {medDisplay && (
          <div className="rc-row">
            <div className="rc-key">Meds</div>
            <div className="rc-val">💊 {medDisplay}</div>
          </div>
        )}

        {/* Work impact */}
        {wi && wi.id!=='no_impact' && (
          <div className="rc-row">
            <div className="rc-key">Work</div>
            <div className="rc-val" style={{color:'var(--orange)'}}>💼 {wi.label}</div>
          </div>
        )}

        {/* Notes */}
        {notes && (
          <div className="rc-row">
            <div className="rc-key">Notes</div>
            <div className="rc-val" style={{fontStyle:'italic',color:'var(--text-dim)'}}>{notes}</div>
          </div>
        )}

        {/* Empty details state */}
        {trigLabels.length===0 && symLabels.length===0 && !medDisplay && !wi && !notes && (
          <div className="rc-row">
            <div className="rc-key">Details</div>
            <div className="rc-val" style={{color:'var(--text-muted)'}}>None logged</div>
          </div>
        )}
      </div>

      <button className="savebtn" onClick={onSave}>Save Entry ✓</button>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// LOG WIZARD
// ────────────────────────────────────────────────────────────────────────────
function LogWizard({initTime, onSave}) {
  const [step, setStep]         = useState(1);
  const [time, setTime]         = useState(initTime || greeting().period);
  const [score, setScore]       = useState(null);
  const [trigs, setTrigs]       = useState([]);
  const [symptoms, setSymptoms] = useState([]);
  const [med, setMed]           = useState(null);
  const [workImpact, setWorkImpact] = useState(null);
  const [notes, setNotes]       = useState('');

  const goNext = () => setStep(s => Math.min(s+1, TOTAL_STEPS));
  const goBack = () => setStep(s => Math.max(s-1, 1));

  const save = () => {
    onSave({ id:`${today()}-${time}`, date:today(), time, score, triggers:trigs, medication:med, symptoms, workImpact, notes });
  };

  return (
    <div className="wizard">
      <WizardHeader step={step} onBack={goBack}/>
      <div className="wbody">
        {step===1 && <Step1Time time={time} setTime={setTime} onNext={goNext}/>}
        {step===2 && <Step2Severity score={score} setScore={setScore} onNext={()=>{if(score||score===0)goNext();else goNext();}}/>}
        {step===3 && (
          <Step3Details
            trigs={trigs} setTrigs={setTrigs}
            symptoms={symptoms} setSymptoms={setSymptoms}
            med={med} setMed={setMed}
            workImpact={workImpact} setWorkImpact={setWorkImpact}
            notes={notes} setNotes={setNotes}
            onNext={goNext}
          />
        )}
        {step===4 && (
          <Step4Review
            time={time} score={score} trigs={trigs} symptoms={symptoms}
            med={med} workImpact={workImpact} notes={notes}
            onSave={save}
          />
        )}
      </div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// HISTORY SCREEN
// ────────────────────────────────────────────────────────────────────────────
function HistoryScreen({entries}) {
  const grouped = useMemo(()=>{
    const m={};
    entries.forEach(e=>{ if(!m[e.date])m[e.date]=[]; m[e.date].push(e); });
    return Object.entries(m).sort(([a],[b])=>b.localeCompare(a)).slice(0,40);
  },[entries]);

  if (!grouped.length) return (
    <div><div className="sec-head">History</div>
      <div className="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <p>No entries yet — start by logging your first check-in!</p>
      </div>
    </div>
  );

  const timeLabel = t => { const s=TIME_SLOTS.find(sl=>sl.id===t); return s?`${s.e} ${s.full}`:t; };

  return (
    <div className="fi">
      <div className="sec-head">History</div>
      <div style={{height:'8px'}}/>
      {grouped.map(([date,de])=>(
        <div key={date}>
          <div className="sec-div">{fmtDate(date)}</div>
          {de.sort((a,b)=>(TIME_ORDER[a.time]??99)-(TIME_ORDER[b.time]??99)).map(e=>{
            const p=pc(e.score);
            const tl=(e.triggers||[]).map(id=>getTrigLabel(id)).filter(Boolean);
            const syms=(e.symptoms||[]).map(id=>SYMPTOMS.find(s=>s.id===id)).filter(Boolean);
            const wi=e.workImpact?WORK_IMPACT.find(w=>w.id===e.workImpact):null;
            return (
              <div key={e.id} className="hi">
                <div className="hdot" style={{background:p.bg,color:p.color}}>{e.score}</div>
                <div className="hinfo">
                  <div className="hdate">{timeLabel(e.time)}</div>
                  {getMedDisplay(e.medication)&&<div className="hmeta">💊 {getMedDisplay(e.medication)}</div>}
                  {wi&&wi.id!=='no_impact'&&<div className="hmeta">💼 {wi.label}</div>}
                  {tl.length>0&&(<div className="htags">{tl.slice(0,3).map((t,i)=><span key={i} className="htag">{t.e} {t.l}</span>)}{tl.length>3&&<span className="htag">+{tl.length-3}</span>}</div>)}
                  {syms.length>0&&(<div className="htags">{syms.slice(0,3).map(s=><span key={s.id} className="htag sym">{s.l}</span>)}{syms.length>3&&<span className="htag sym">+{syms.length-3}</span>}</div>)}
                  {e.notes&&<div className="hmeta" style={{marginTop:'5px',fontStyle:'italic'}}>"{e.notes}"</div>}
                </div>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// INSIGHTS SCREEN
// ────────────────────────────────────────────────────────────────────────────
function InsightsScreen({entries}) {
  const trendData = useMemo(()=>Array.from({length:30},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(29-i));
    const ds=d.toISOString().split('T')[0];
    const de=entries.filter(e=>e.date===ds);
    const avg=de.length?de.reduce((s,e)=>s+e.score,0)/de.length:null;
    const trigCount=de.reduce((s,e)=>s+(e.triggers||[]).length,0);
    return {ds,avg,lbl:d.getDate().toString(),trigCount};
  }),[entries]);

  const trigFreq = useMemo(()=>{
    const ct={};
    entries.forEach(e=>(e.triggers||[]).forEach(t=>{ct[t]=(ct[t]||0)+1;}));
    const result=[];
    TRIGGERS.forEach(t=>{if(ct[t.id])result.push({...t,count:ct[t.id]});});
    Object.entries(ct).forEach(([k,v])=>{if(k.startsWith('custom:'))result.push({id:k,e:'✏️',l:k.slice(7),count:v});});
    return result.filter(t=>t.count>0).sort((a,b)=>b.count-a.count).slice(0,8);
  },[entries]);

  const stats = useMemo(()=>{
    const all=entries.map(e=>e.score);
    const avg=all.length?(all.reduce((a,b)=>a+b,0)/all.length).toFixed(1):'—';
    const now=new Date(), mStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const mDays=new Set(entries.filter(e=>e.score>=3&&e.date.startsWith(mStr)).map(e=>e.date)).size;
    return {avg,mDays,top:trigFreq.length>0?trigFreq[0].e:'—'};
  },[entries,trigFreq]);

  const timeAvg = useMemo(()=>{
    const calc=t=>{const es=entries.filter(e=>e.time===t);return es.length?(es.reduce((s,e)=>s+e.score,0)/es.length).toFixed(1):'0.0';};
    return {am:calc('am'),pm:calc('pm'),night:calc('night')};
  },[entries]);

  const workStats = useMemo(()=>{
    const now=new Date(), mStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const mEntries=entries.filter(e=>e.date.startsWith(mStr)&&e.workImpact);
    const counts={}; WORK_IMPACT.forEach(w=>{counts[w.id]=0;});
    mEntries.forEach(e=>{if(counts[e.workImpact]!==undefined)counts[e.workImpact]++;});
    const affected=new Set(mEntries.filter(e=>e.workImpact&&e.workImpact!=='no_impact').map(e=>e.date)).size;
    return {counts,totalAffected:affected,maxCount:Math.max(...WORK_IMPACT.filter(w=>w.id!=='no_impact').map(w=>counts[w.id]),1)};
  },[entries]);

  return (
    <div className="fi">
      <div className="sec-head">Insights</div>
      <div className="sec-sub">Based on your last 30 days</div>
      <div className="stat-row">
        <div className="sc"><div className="sv" style={{color:'var(--accent)'}}>{stats.avg}</div><div className="sl">Avg Score</div></div>
        <div className="sc"><div className="sv" style={{color:'#f97316'}}>{stats.mDays}</div><div className="sl">Migraine Days</div></div>
        <div className="sc"><div className="sv" style={{fontSize:'30px'}}>{stats.top}</div><div className="sl">Top Trigger</div></div>
      </div>
      <div className="card">
        <div className="ct">30-Day Pain Trend</div>
        <div style={{height:'140px'}}><LineSVG data={trendData}/></div>
        <div style={{marginTop:'18px',paddingTop:'14px',borderTop:'1px solid var(--border)'}}>
          <div className="ct" style={{color:'var(--teal)',marginBottom:'8px'}}>Trigger Load</div>
          <div style={{height:'72px'}}><TrigLoadSVG data={trendData}/></div>
        </div>
      </div>
      <div className="card">
        <div className="ct">AM · PM · Night</div>
        {[
          {label:'☀️ AM',    val:timeAvg.am,    grad:'linear-gradient(90deg,#fbbf24,#f97316)'},
          {label:'🌆 PM',    val:timeAvg.pm,    grad:'linear-gradient(90deg,#a78bfa,#7c3aed)'},
          {label:'🌙 Night', val:timeAvg.night, grad:'linear-gradient(90deg,#60a5fa,#3b82f6)'},
        ].map((r,i)=>(
          <div key={i} style={{marginBottom:i<2?'14px':'0'}}>
            <div style={{fontSize:'11px',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'5px'}}>{r.label} Average — {r.val}</div>
            <div className="bar-track"><div className="bar-fill" style={{width:`${(parseFloat(r.val)/5)*100}%`,background:r.grad}}/></div>
          </div>
        ))}
      </div>
      {trigFreq.length>0&&(
        <div className="card"><div className="ct">Top Triggers</div><TrigBarSVG data={trigFreq}/></div>
      )}
      <div className="card">
        <div className="ct">Work Impact This Month</div>
        {workStats.totalAffected===0
          ? <div style={{fontSize:'13px',color:'var(--text-muted)'}}>No work impact logged this month 🎉</div>
          : (<>
              <div style={{fontSize:'13px',color:'var(--text-dim)',marginBottom:'16px'}}>
                <span style={{color:'var(--orange)',fontWeight:'600',fontSize:'22px',fontFamily:'var(--font-d)'}}>{workStats.totalAffected}</span>
                <span style={{marginLeft:'6px'}}>days affected this month</span>
              </div>
              {WORK_IMPACT.filter(w=>w.id!=='no_impact').map(w=>(
                <div key={w.id} style={{marginBottom:'10px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'4px'}}>
                    <span>{w.label}</span>
                    <span style={{color:workStats.counts[w.id]>0?'var(--orange)':'var(--text-muted)'}}>{workStats.counts[w.id]} {workStats.counts[w.id]===1?'day':'days'}</span>
                  </div>
                  <div className="bar-track"><div className="bar-fill" style={{width:`${workStats.maxCount>0?(workStats.counts[w.id]/workStats.maxCount)*100:0}%`,background:'linear-gradient(90deg,#fb923c,#f97316)'}}/></div>
                </div>
              ))}
            </>)
        }
      </div>
      <div style={{height:'8px'}}/>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// APP
// ────────────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen]   = useState('today');
  const [logTime, setLogTime] = useState(null);
  const [toast, setToast]     = useState(null);
  const [entries, setEntries] = useState(()=>{
    try { const s=localStorage.getItem('hs_entries'); if(s)return JSON.parse(s); } catch(e){}
    return sampleData();
  });
  const {wx, loading:wxL, err:wxE} = useWeather();
  useEffect(()=>{ try{localStorage.setItem('hs_entries',JSON.stringify(entries));}catch(e){} },[entries]);

  const openLog = useCallback((t)=>{ setLogTime(t||greeting().period); setScreen('log'); },[]);

  const saveEntry = useCallback((entry)=>{
    setEntries(p=>[...p.filter(e=>e.id!==entry.id),entry]);
    setScreen('today');
    setToast('✓  Entry saved!');
    setTimeout(()=>setToast(null),2100);
  },[]);

  return (
    <div className="app">
      {toast && <div className="toast">{toast}</div>}
      <div className="scroll">
        {screen==='today'    && <TodayScreen entries={entries} onLog={openLog} wx={wx} wxLoad={wxL} wxErr={wxE}/>}
        {screen==='log'      && <LogWizard initTime={logTime} onSave={saveEntry}/>}
        {screen==='history'  && <HistoryScreen entries={entries}/>}
        {screen==='insights' && <InsightsScreen entries={entries}/>}
      </div>
      <nav className="nav">
        <button className={`nb ${screen==='today'?'on':''}`} onClick={()=>setScreen('today')}>
          <svg viewBox="0 0 24 24" fill={screen==='today'?'currentColor':'none'} stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
          <span>Today</span>
        </button>
        <button className={`nb ${screen==='history'?'on':''}`} onClick={()=>setScreen('history')}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
          <span>History</span>
        </button>
        <div className="fab-wrap">
          <button className="fab" onClick={()=>openLog()}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <button className={`nb ${screen==='insights'?'on':''}`} onClick={()=>setScreen('insights')}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="18" y="3" width="4" height="18"/><rect x="10" y="8" width="4" height="13"/><rect x="2" y="13" width="4" height="8"/></svg>
          <span>Insights</span>
        </button>
        <button className={`nb ${screen==='log'?'on':''}`} onClick={()=>openLog()}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span>Log</span>
        </button>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
